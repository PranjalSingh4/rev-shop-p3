version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: revshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: revshop
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revshop-net

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: revshop-config
    ports:
      - "8888:8888"
    networks:
      - revshop-net
    depends_on:
      mysql:
        condition: service_healthy

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: revshop-eureka
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    networks:
      - revshop-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: revshop-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
    networks:
      - revshop-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: revshop-user
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - JWT_SECRET=revshop-secret-key-2024-very-long-and-secure-key-for-jwt-signing
      - JWT_EXPIRATION=86400000
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - revshop-net

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: revshop-product
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - revshop-net

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: revshop-cart
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - revshop-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: revshop-order
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - revshop-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: revshop-payment
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - revshop-net

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: revshop-notification
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@eureka-server:8761/eureka/
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
    networks:
      - revshop-net

  angular-frontend:
    build:
      context: ./revshop-frontend
      dockerfile: Dockerfile
    container_name: revshop-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - revshop-net

volumes:
  mysql_data:

networks:
  revshop-net:
    driver: bridge

